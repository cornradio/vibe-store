name: AI Auto-Moderator

on:
  issues:
    types: [opened, labeled, unlabeled, edited]

jobs:
  review:
    if: |
      (
        (github.event.action == 'labeled' && github.event.label.name == 'approved') ||
        (github.event.action == 'unlabeled' && github.event.label.name == 'approved') ||
        (github.event.action == 'opened' && (contains(github.event.issue.labels.*.name, 'app-submission') || startsWith(github.event.issue.title, '[App]'))) ||
        (github.event.action == 'edited' && contains(github.event.issue.labels.*.name, 'approved'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install openai

      - name: AI review and update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_ACTION: ${{ github.event.action }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/review.py

      - name: Commit and push
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "VibeStoreBot"
          git config --global user.email "bot@vibestore.local"
          git add data.json
          git commit -m "Update vibe app from issue #${{ github.event.issue.number }}" || exit 0
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push
